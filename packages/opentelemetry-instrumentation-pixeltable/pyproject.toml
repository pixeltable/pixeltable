[project]
name = "opentelemetry-instrumentation-pixeltable"
dynamic = ["version"]
description = "OpenTelemetry instrumentation for Pixeltable"
authors = [{ name = "Pixeltable, Inc.", email = "contact@pixeltable.com" }]
requires-python = ">=3.10"
readme = "README.md"
license = "Apache-2.0"
classifiers = [
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = [
    "pixeltable",
    "opentelemetry-api>=1.39.0",
    "opentelemetry-sdk>=1.39.0",
    "opentelemetry-instrumentation>=0.60b0",
    "opentelemetry-exporter-otlp-proto-http>=1.39.0",
    "opentelemetry-exporter-otlp-proto-grpc>=1.39.0",
]

[project.urls]
homepage = "https://pixeltable.com/"
repository = "https://github.com/pixeltable/pixeltable"

[project.entry-points.opentelemetry_instrumentor]
pixeltable = "opentelemetry.instrumentation.pixeltable:PixeltableInstrumentor"

[tool.uv.sources]
pixeltable = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "src/opentelemetry/instrumentation/pixeltable/version.py"

[tool.hatch.build.targets.sdist]
include = ["/src", "/tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/opentelemetry"]
