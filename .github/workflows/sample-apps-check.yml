name: Sample Apps Check

on:
  pull_request:
    paths:
      - 'docs/sample-apps/**'
  push:
    branches:
      - sample-app-refresh
    paths:
      - 'docs/sample-apps/**'

jobs:
  uv-sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - docs/sample-apps/intelligence-hub
          - docs/sample-apps/cli-media-toolkit
          - docs/sample-apps/context-aware-discord-bot
          - docs/sample-apps/reddit-agentic-bot
          - docs/sample-apps/jfk-files-mcp-server
          - docs/sample-apps/prompt-engineering-studio-gradio-application
          - docs/sample-apps/ai-based-trading-insight-chrome-extension
          - docs/sample-apps/text-and-image-similarity-search-nextjs-fastapi
          - docs/sample-apps/multimodal-chat/backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        working-directory: ${{ matrix.app }}
        run: uv sync

      - name: Import check
        working-directory: ${{ matrix.app }}
        run: |
          if [ -f schema.py ]; then uv run python -c "import schema"
          elif [ -f setup_pixeltable.py ]; then uv run python -c "import setup_pixeltable"
          elif [ -f server/schema.py ]; then cd server && uv run python -c "import schema"
          else echo "No schema module to import"
          fi
