name: benchmark-slack-report

on:
  schedule:
    # 08:00 PST = 16:00 UTC. GitHub cron is UTC-only, so during PDT (summer) this fires at 09:00 local.
    - cron: "0 16 * * *"
  workflow_dispatch:
  push:
    branches: [perf_alerts]  # TEMPORARY: lets the workflow run on this branch for testing. Remove before merge.

env:
  GRAFANA_INSTANCE_ID: '1465844'
  GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}  # Same secret the benchmark push uses
  GRAFANA_PROM_URL: ${{ secrets.GRAFANA_PROM_URL }}  # Grafana Cloud Prometheus query base, ending in /api/prom
  # The destination channel is fixed by whichever channel this incoming webhook was created for.
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  BENCHMARK_BRANCH: main

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Diagnose Grafana series (TEMPORARY)
        run: |
          base="${GRAFANA_PROM_URL%/}/api/v1"
          echo "== metric names matching benchmark.* =="
          curl -s -G "$base/label/__name__/values" \
            -u "${GRAFANA_INSTANCE_ID}:${GRAFANA_SERVICE_ACCOUNT_TOKEN}" \
            --data-urlencode 'match[]={__name__=~"benchmark.*"}' | jq
          echo "== series labels (name / branch / test) over 14d =="
          curl -s -G "$base/query" \
            -u "${GRAFANA_INSTANCE_ID}:${GRAFANA_SERVICE_ACCOUNT_TOKEN}" \
            --data-urlencode 'query=last_over_time({__name__=~"benchmark.*"}[14d])' \
            | jq -r '.data.result[].metric | "\(.__name__)  branch=\(.branch)  test=\(.test_name)"' | sort -u
      - name: Post benchmark digest to Slack
        run: ./scripts/benchmark-slack-report.sh
