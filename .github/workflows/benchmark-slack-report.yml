name: benchmark-slack-report

on:
  schedule:
    # 08:00 PST = 16:00 UTC. GitHub cron is UTC-only, so during PDT (summer) this fires at 09:00 local.
    - cron: "0 16 * * *"
  workflow_dispatch:

env:
  GRAFANA_INSTANCE_ID: ${{ secrets.GRAFANA_INSTANCE_ID }}  # Grafana stack ID (used by the OTLP push path)
  GRAFANA_PROM_USER: ${{ secrets.GRAFANA_PROM_USER }}  # Metrics (Prometheus) instance ID; query endpoint wants this, not the stack ID
  GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}  # Same secret the benchmark push uses
  GRAFANA_PROM_URL: ${{ secrets.GRAFANA_PROM_URL }}  # Grafana Cloud Prometheus query base, ending in /api/prom
  # The destination channel is fixed by whichever channel this incoming webhook was created for.
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  BENCHMARK_BRANCH: main

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Post benchmark digest to Slack
        run: ./scripts/benchmark-slack-report.sh
