name: Update Codebase Index

on:
  push:
    branches: [main]
    paths:
      - 'pixeltable/**/*.py'
  workflow_dispatch:  # manual trigger

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate AST-based codebase index
        run: python tool/generate_codebase_index.py --root pixeltable --output .claude/CODEBASE_INDEX.md

      - name: Check for changes
        id: check
        run: |
          if git ls-files --error-unmatch .claude/CODEBASE_INDEX.md &>/dev/null; then
            git diff --quiet .claude/CODEBASE_INDEX.md && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/CODEBASE_INDEX.md
          git commit -m "Update codebase index"
          git push
